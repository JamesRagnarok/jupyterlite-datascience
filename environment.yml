name: xeus-kernel
channels:
  - https://repo.mamba.pm/emscripten-forge
  - conda-forge
dependencies:
  - python=3.11 # specify Python version for compatibility with pandas 1.5.3
  - xeus-python
  - ipycanvas
  - ipywidgets
  - pandas=1.5.3 # specify pandas version for compatibility with bioinfokit
  - matplotlib
  - seaborn
  - statsmodels

  - scikit-posthocs
  - scipy
  - pip
  - pip:
    - sklearn
    - tabulate
    - textwrap3
    - matplotlib_venn
    - bioinfokit
